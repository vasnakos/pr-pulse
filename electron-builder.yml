appId: com.vasilisnakos.prpulse
productName: PR Pulse
directories:
  buildResources: build
  output: builds
files:
  - out/**/*
  - package.json
mac:
  target:
    - dmg
win:
  target:
    - nsis
linux:
  target:
    - AppImage
    - deb
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish: null
